name: AutoResearchClaw Agent

on:
  workflow_dispatch:
    inputs:
      research_topic:
        description: 'Research topic or goal to investigate'
        required: true
        type: string
      media_id:
        description: 'MorphoSource media ID to use as seed (e.g. 000038412). Leave blank for topic-only research.'
        required: false
        type: string
        default: ''
      openai_model:
        description: 'OpenAI model to use (default: gpt-4o)'
        required: false
        type: string
        default: 'gpt-4o'

jobs:
  create-research-issue:
    name: Create Research Issue
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
    outputs:
      issue_number: ${{ steps.create-issue.outputs.issue_number }}

    steps:
      - name: Create research discussion issue
        id: create-issue
        uses: actions/github-script@v8
        with:
          script: |
            const topic = `${{ inputs.research_topic }}`;
            const mediaId = `${{ inputs.media_id }}`.trim();
            const model = `${{ inputs.openai_model }}` || 'gpt-4o';

            const seedLine = mediaId
              ? `**Seed Media ID:** [\`${mediaId}\`](https://www.morphosource.org/concern/media/${mediaId})`
              : '**Seed Media ID:** _none (topic-only research)_';

            const body = [
              '### 🧪 AutoResearchClaw Research Session',
              '',
              '**Research Topic:**',
              topic,
              '',
              seedLine,
              `**Model:** \`${model}\``,
              '',
              '---',
              '',
              '🔄 **Status:** Researching…',
              '',
              'This issue was created by the AutoResearchClaw agent. ',
              'The agent will decompose the research topic into targeted MorphoSource queries, ',
              'search for relevant specimen data, and post a synthesis report below.',
              '',
              'Feel free to add comments to refine the research direction — the ',
              '[issue-comment-reply](' +
              `https://github.com/${context.repo.owner}/${context.repo.repo}` +
              '/actions/workflows/issue-comment-reply.yml) workflow will pick up follow-up questions.',
            ].join('\n');

            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Research: ${topic}`,
              body: body,
              labels: ['research-agent'],
            });

            core.setOutput('issue_number', issue.data.number.toString());
            console.log(`Created research issue #${issue.data.number}`);

  research-pipeline:
    name: Run Research Pipeline
    runs-on: ubuntu-latest
    needs: create-research-issue
    permissions:
      issues: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install openai requests

      - name: Run research agent
        id: research
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ inputs.openai_model || 'gpt-4o' }}
          MORPHOSOURCE_API_KEY: ${{ secrets.MORPHOSOURCE_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          ISSUE_NUMBER: ${{ needs.create-research-issue.outputs.issue_number }}
          DEBUG: 'true'
        working-directory: .github/scripts
        run: |
          MEDIA_ARG=""
          if [ -n "${{ inputs.media_id }}" ]; then
            MEDIA_ARG="--media-id ${{ inputs.media_id }}"
          fi
          python research_agent.py "${{ inputs.research_topic }}" $MEDIA_ARG

      - name: Upload research artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: research-report
          path: |
            .github/scripts/research_report.json
            .github/scripts/research_report.md
          if-no-files-found: warn

      - name: Post final report to issue (fallback)
        if: always()
        env:
          ISSUE_NUMBER: ${{ needs.create-research-issue.outputs.issue_number }}
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const issueNumber = parseInt(process.env.ISSUE_NUMBER || '0');
            if (!issueNumber) {
              console.log('No issue number, skipping');
              return;
            }

            let reportBody = '';
            const reportMdPath = '.github/scripts/research_report.md';
            const reportJsonPath = '.github/scripts/research_report.json';

            if (fs.existsSync(reportMdPath)) {
              reportBody = fs.readFileSync(reportMdPath, 'utf8');
            } else if (fs.existsSync(reportJsonPath)) {
              const data = JSON.parse(fs.readFileSync(reportJsonPath, 'utf8'));
              reportBody = (data.report && data.report.report) || JSON.stringify(data, null, 2);
            }

            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const jobStatus = '${{ job.status }}';

            const comment = [
              '## 📊 AutoResearchClaw — Final Summary',
              '',
              `**Workflow status:** ${jobStatus}`,
              '',
              reportBody
                ? reportBody
                : '_No report file was generated. Check the [workflow run](' + runUrl + ') for details._',
              '',
              '---',
              '',
              `**[View workflow run](${runUrl})**`,
              '',
              '_Post a follow-up comment on this issue to refine the research or ask additional questions._',
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: comment,
            });

            const finalLabels = jobStatus === 'success'
              ? ['research-agent', 'completed']
              : ['research-agent', 'needs-review'];

            await github.rest.issues.setLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              labels: finalLabels,
            });

            console.log(`Posted final summary to issue #${issueNumber} (status: ${jobStatus})`);
